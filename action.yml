name: "agent-sign"
description: "Sign AI agent files or publish nono packages with Sigstore and Nono keyless attestation"
author: "Phase Security"

branding:
  icon: "shield"
  color: "blue"

inputs:
  nono-version:
    description: "nono CLI version to install (e.g. v0.6.1). Defaults to latest release."
    required: false
    default: "latest"
  package-version:
    description: "Registry package version to publish. Required when publish is true."
    required: false
    default: ""
  files:
    description: >
      Whitespace-separated list of files to sign.
      If empty, uses --all to sign all files matching trust policy includes.
      When multiple files are specified, they are signed together into a single
      multi-subject bundle (.nono-trust.bundle) for atomic verification.
    required: false
    default: ""
  per-file:
    description: >
      Sign each file separately with its own sidecar bundle (<file>.bundle) instead
      of combining into a single multi-subject bundle. Default is false (multi-subject).
    required: false
    default: "false"
  commit:
    description: "Commit bundle files back to the repository."
    required: false
    default: "true"
  upload-artifacts:
    description: "Upload bundle files as workflow artifacts."
    required: false
    default: "false"
  verify:
    description: "Run verification after signing as a smoke test."
    required: false
    default: "true"
  trust-policy:
    description: "Path to trust-policy.json for verification. Only used when verify is true."
    required: false
    default: ""
  working-directory:
    description: "Working directory for signing. Defaults to repository root."
    required: false
    default: "."
  commit-message:
    description: "Commit message for bundle commits."
    required: false
    default: "chore: update attestation bundles [skip ci]"
  publish:
    description: "Publish a nono package version to the registry after signing."
    required: false
    default: "false"
  package-name:
    description: "Registry package name. Required when publish is true."
    required: false
    default: ""
  package-namespace:
    description: "Registry namespace or organization. Optional: defaults to the owner of GITHUB_REPOSITORY."
    required: false
    default: ""
  registry-url:
    description: "Registry API base URL. Used when publish is true."
    required: false
    default: "https://registry.nono.sh/api/v1"
  package-path:
    description: "Package directory containing package.json and artifacts. Used when publish is true."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Detect platform
      id: platform
      shell: bash
      run: |
        ARCH="$(uname -m)"
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"

        case "${ARCH}" in
          x86_64)  RUST_ARCH="x86_64" ;;
          aarch64) RUST_ARCH="aarch64" ;;
          arm64)   RUST_ARCH="aarch64" ;;
          *)       echo "::error::Unsupported architecture: ${ARCH}"; exit 1 ;;
        esac

        case "${OS}" in
          linux)  RUST_OS="unknown-linux-gnu" ;;
          darwin) RUST_OS="apple-darwin" ;;
          *)      echo "::error::Unsupported OS: ${OS}"; exit 1 ;;
        esac

        echo "target=${RUST_ARCH}-${RUST_OS}" >> "${GITHUB_OUTPUT}"

    - name: Resolve version
      id: version
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.nono-version }}
      run: |
        if [ "${INPUT_VERSION}" = "latest" ]; then
          VERSION="$(gh release view --repo always-further/nono --json tagName -q .tagName)"
          echo "resolved=${VERSION}" >> "${GITHUB_OUTPUT}"
        else
          echo "resolved=${INPUT_VERSION}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Install nono
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.resolved }}
        TARGET: ${{ steps.platform.outputs.target }}
      run: |
        DOWNLOAD_URL="https://github.com/always-further/nono/releases/download/${VERSION}/nono-${VERSION}-${TARGET}.tar.gz"
        echo "::group::Installing nono ${VERSION} (${TARGET})"
        echo "Downloading ${DOWNLOAD_URL}"

        curl -fsSL "${DOWNLOAD_URL}" -o /tmp/nono.tar.gz
        tar xzf /tmp/nono.tar.gz -C /tmp
        sudo mv /tmp/nono /usr/local/bin/nono
        rm -f /tmp/nono.tar.gz

        echo "Installed: $(nono --version)"
        echo "::endgroup::"

    - name: Sign files
      id: sign
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_PER_FILE: ${{ inputs.per-file }}
        INPUT_PUBLISH: ${{ inputs.publish }}
        INPUT_PACKAGE_NAME: ${{ inputs.package-name }}
        INPUT_PACKAGE_NAMESPACE: ${{ inputs.package-namespace }}
        PACKAGE_VERSION: ${{ inputs.package-version }}
        INPUT_PACKAGE_PATH: ${{ inputs.package-path }}
        INPUT_WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        cd "${INPUT_WORKING_DIR}"

        if [ "${INPUT_PUBLISH}" = "true" ]; then
          if [ -z "${INPUT_PACKAGE_NAME}" ] || [ -z "${PACKAGE_VERSION:-}" ]; then
            echo "::error::package-name and package-version are required when publish=true"
            exit 1
          fi

          if [ ! -d "${INPUT_PACKAGE_PATH}" ]; then
            echo "::error::package-path does not exist: ${INPUT_PACKAGE_PATH}"
            exit 1
          fi

          FILE_LIST="${RUNNER_TEMP}/nono_package_files.txt"
          : > "${FILE_LIST}"
          cd "${INPUT_PACKAGE_PATH}"

          if [ -n "${INPUT_FILES}" ]; then
            for file in ${INPUT_FILES}; do
              if [ -f "${file}" ]; then
                printf '%s\n' "${file}" >> "${FILE_LIST}"
              else
                echo "::error::File not found: ${file}"
                exit 1
              fi
            done
          else
            while IFS= read -r -d '' file; do
              rel="${file#./}"
              case "${rel}" in
                README.md|*.bundle)
                  continue
                  ;;
              esac
              printf '%s\n' "${rel}" >> "${FILE_LIST}"
            done < <(find . -type f ! -path '*/.*' -print0 | sort -z)
          fi

          if [ ! -s "${FILE_LIST}" ]; then
            echo "::error::No package files found to sign"
            exit 1
          fi

          FILES_TO_SIGN=""
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            FILES_TO_SIGN="${FILES_TO_SIGN} ${file}"
          done < "${FILE_LIST}"

          echo "Signing files as multi-subject bundle:${FILES_TO_SIGN}"
          nono trust sign --keyless --multi-subject ${FILES_TO_SIGN}

          {
            echo "bundles<<NONO_EOF"
            echo ".nono-trust.bundle"
            echo "NONO_EOF"
          } >> "${GITHUB_OUTPUT}"
        elif [ -z "${INPUT_FILES}" ]; then
          # No files specified: use --all (discovers and signs all instruction files)
          echo "Signing all files (--keyless --all)"
          nono trust sign --keyless --all
        elif [ "${INPUT_PER_FILE}" = "true" ]; then
          # Per-file mode: sign each file separately
          for file in ${INPUT_FILES}; do
            if [ -f "${file}" ]; then
              echo "Signing ${file} (per-file bundle)"
              nono trust sign --keyless "${file}"
            else
              echo "::warning::File not found: ${file}"
            fi
          done
        else
          # Multi-subject mode (default): sign all files together
          FILES_TO_SIGN=""
          for file in ${INPUT_FILES}; do
            if [ -f "${file}" ]; then
              FILES_TO_SIGN="${FILES_TO_SIGN} ${file}"
            else
              echo "::warning::File not found: ${file}"
            fi
          done

          if [ -n "${FILES_TO_SIGN}" ]; then
            echo "Signing files as multi-subject bundle:${FILES_TO_SIGN}"
            nono trust sign --keyless --multi-subject ${FILES_TO_SIGN}
          else
            echo "::error::No valid files to sign"
            exit 1
          fi
        fi

        # Collect generated bundles for downstream steps
        BUNDLES="$(find . -name '*.bundle' -type f | sort -u)"
        {
          echo "bundles<<NONO_EOF"
          echo "${BUNDLES}"
          echo "NONO_EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Verify signatures
      if: inputs.verify == 'true' && inputs.publish != 'true'
      shell: bash
      env:
        INPUT_TRUST_POLICY: ${{ inputs.trust-policy }}
        INPUT_WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        cd "${INPUT_WORKING_DIR}"

        POLICY_ARG=""
        if [ -n "${INPUT_TRUST_POLICY}" ]; then
          POLICY_ARG="--policy ${INPUT_TRUST_POLICY}"
        fi

        echo "::group::Verifying file signatures"
        nono trust verify ${POLICY_ARG} --all
        echo "::endgroup::"

    - name: Commit bundles
      if: inputs.commit == 'true' && inputs.publish != 'true'
      shell: bash
      env:
        INPUT_WORKING_DIR: ${{ inputs.working-directory }}
        INPUT_COMMIT_MSG: ${{ inputs.commit-message }}
      run: |
        cd "${INPUT_WORKING_DIR}"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Stage both per-file bundles and multi-subject bundles
        git add -A '*.bundle' '.nono-trust.bundle' 2>/dev/null || true

        if git diff --cached --quiet; then
          echo "No bundle changes to commit."
        else
          git commit -m "${INPUT_COMMIT_MSG}"
          git push
        fi

    - name: Upload artifacts
      if: inputs.upload-artifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: instruction-file-bundles
        path: |
          ${{ inputs.working-directory }}/**/*.bundle
          ${{ inputs.working-directory }}/.nono-trust.bundle
        if-no-files-found: warn

    - name: Publish package
      if: inputs.publish == 'true'
      shell: bash
      env:
        PACKAGE_NAME: ${{ inputs.package-name }}
        PACKAGE_NAMESPACE: ${{ inputs.package-namespace }}
        PACKAGE_VERSION: ${{ inputs.package-version }}
        PACKAGE_PATH: ${{ inputs.package-path }}
        REGISTRY_URL: ${{ inputs.registry-url }}
      run: bash ${{ github.action_path }}/sign-and-publish.sh
